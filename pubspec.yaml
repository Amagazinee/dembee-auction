name: dembee_app
description: "Дэмбээ (Dembee) — Монголын уламжлалт дуудлага худалдааны апп"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5
  cloud_functions: ^5.3.4

  # Routing
  go_router: ^14.8.1

  # UI
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
  adaptive_icon_background: "#0C0C0E"
  adaptive_icon_foreground: assets/images/logo.png
  web:
    generate: true
    image_path: assets/images/logo.png
    background_color: "#0C0C0E"
    theme_color: "#C9A84C"
  windows:
    generate: true
    image_path: assets/images/logo.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/images/logo.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/
